apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-webapp
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-webapp
  template:
    metadata:
      labels:
        app: sample-webapp
    spec:
      containers:
      - name: sample-webapp
        image: 932316879568.dkr.ecr.ap-south-1.amazonaws.com/sample-webapp:latest
        ports:
        - containerPort: 80
