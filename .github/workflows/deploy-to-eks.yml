name: CI/CD Sample Webapp

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_ACCOUNT_ID: 932316879568
  ECR_REPOSITORY: sample-webapp
  NAMESPACE: myapp
  DEPLOYMENT_NAME: sample-webapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to AWS ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        IMAGE_TAG=${GITHUB_SHA::8}
        docker build -t $ECR_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG \
                   $ECR_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

    - name: Push Docker image to ECR
      run: |
        IMAGE_TAG=${GITHUB_SHA::8}
        docker push $ECR_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

    - name: Deploy to EKS
      run: |
        # Update kubeconfig
        aws eks update-kubeconfig --region $AWS_REGION --name ha-webapp-cluster

        # Create namespace if not exists
        kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE

        # Check if deployment exists
        if kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE; then
          # Update image if deployment exists
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $DEPLOYMENT_NAME=$ECR_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest \
            -n $NAMESPACE
          kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE
        else
          # Apply deployment.yaml if deployment doesn't exist
          kubectl apply -f deployment.yaml -n $NAMESPACE
        fi
